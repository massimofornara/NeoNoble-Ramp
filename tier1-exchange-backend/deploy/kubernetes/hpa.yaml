apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tier1-exchange-api
  namespace: tier1-exchange
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tier1-exchange-api
  minReplicas: 3
  maxReplicas: 12
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
