apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tier1-postgres
  namespace: tier1-exchange
spec:
  serviceName: tier1-postgres
  replicas: 1
  selector:
    matchLabels:
      app: tier1-postgres
  template:
    metadata:
      labels:
        app: tier1-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: tier1
            - name: POSTGRES_USER
              value: tier1
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: tier1-exchange-secrets
                  key: POSTGRES_PASSWORD
                  optional: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "tier1"]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "tier1"]
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi
---
apiVersion: v1
kind: Service
metadata:
  name: tier1-postgres
  namespace: tier1-exchange
spec:
  selector:
    app: tier1-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
