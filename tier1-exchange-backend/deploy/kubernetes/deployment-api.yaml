apiVersion: apps/v1
kind: Deployment
metadata:
  name: tier1-exchange-api
  namespace: tier1-exchange
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: tier1-exchange-api
  template:
    metadata:
      labels:
        app: tier1-exchange-api
    spec:
      containers:
        - name: api
          image: tier1-exchange-backend:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: tier1-exchange-config
            - secretRef:
                name: tier1-exchange-secrets
          ports:
            - containerPort: 4100
              name: http
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: exchange-data
              mountPath: /var/lib/tier1-exchange
      volumes:
        - name: exchange-data
          emptyDir: {}
