apiVersion: apps/v1
kind: Deployment
metadata:
  name: tier1-settlement-worker
  namespace: tier1-exchange
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tier1-settlement-worker
  template:
    metadata:
      labels:
        app: tier1-settlement-worker
    spec:
      containers:
        - name: worker
          image: tier1-exchange-backend:latest
          envFrom:
            - configMapRef:
                name: tier1-exchange-config
            - secretRef:
                name: tier1-exchange-secrets
          env:
            - name: WORKER_ROLE
              value: settlement
          readinessProbe:
            httpGet:
              path: /health
              port: 4100
          livenessProbe:
            httpGet:
              path: /health
              port: 4100
---
