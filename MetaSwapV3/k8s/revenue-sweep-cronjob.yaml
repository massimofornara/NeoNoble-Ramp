apiVersion: batch/v1
kind: CronJob
metadata:
  name: metaswap-v3-revenue-sweep
  namespace: metaswap
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: sweep
              image: metaswap-v3-core:1.0.6
              imagePullPolicy: IfNotPresent
              env:
                - name: ADMIN_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: metaswap-production-secrets
                      key: ADMIN_API_KEY
                - name: METASWAP_CORE_URL
                  value: "http://metaswap-core:80"
              command:
                - node
                - -e
                - |
                  const controller = new AbortController();
                  const timer = setTimeout(() => controller.abort(), 120000);
                  const response = await fetch(`${process.env.METASWAP_CORE_URL}/revenue/distribution/sweep`, {
                    method: "POST",
                    headers: {
                      "content-type": "application/json",
                      "x-admin-api-key": process.env.ADMIN_API_KEY
                    },
                    body: "{}",
                    signal: controller.signal
                  });
                  clearTimeout(timer);
                  const body = await response.text();
                  console.log(body);
                  if (!response.ok) process.exit(1);
                  process.exit(0);
