apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metaswap-core
  namespace: metaswap
  annotations:
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "4"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "75"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "75"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["api.metaswap.local"]
      secretName: metaswap-tls
  rules:
    - host: api.metaswap.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metaswap-core
                port:
                  number: 80
