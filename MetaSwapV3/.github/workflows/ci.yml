name: ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: node --test
      - run: docker build -t metaswap-v3-core:${{ github.sha }} .
