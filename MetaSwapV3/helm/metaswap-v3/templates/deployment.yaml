apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}-core
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-core
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-core
    spec:
      priorityClassName: metaswap-critical
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: core
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            {{- range $key := .Values.requiredSecretKeys }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: metaswap-production-secrets
                  key: {{ $key }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
