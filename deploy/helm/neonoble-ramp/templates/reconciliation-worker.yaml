apiVersion: apps/v1
kind: Deployment
metadata:
  name: neonoble-reconciliation-worker
  labels:
    app.kubernetes.io/name: neonoble-reconciliation-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: neonoble-reconciliation-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neonoble-reconciliation-worker
    spec:
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "workers/reconciliationWorker.js"]
          envFrom:
            - secretRef:
                name: neonoble-ramp-secrets
          env:
            - name: RECONCILIATION_BASE_URL
              value: http://neonoble-ramp
            - name: RECONCILIATION_INTERVAL_MS
              value: "60000"
          resources:
{{ toYaml .Values.resources | indent 12 }}
