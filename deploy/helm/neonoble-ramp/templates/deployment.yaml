apiVersion: apps/v1
kind: Deployment
metadata:
  name: neonoble-ramp
  labels:
    app.kubernetes.io/name: neonoble-ramp
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: neonoble-ramp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neonoble-ramp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/metrics
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: neonoble-ramp-secrets
          env:
            - name: OTEL_ENABLED
              value: "{{ .Values.otel.enabled }}"
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.otel.serviceName }}"
            - name: EXCHANGE_EVENT_STREAM
              value: exchange:events
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
          resources:
{{ toYaml .Values.resources | indent 12 }}
