apiVersion: apps/v1
kind: Deployment
metadata:
  name: neonoble-ramp
  namespace: neonoble-ramp
  labels:
    app.kubernetes.io/name: neonoble-ramp
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 100%
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: neonoble-ramp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neonoble-ramp
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /api/metrics
        prometheus.io/port: "3000"
    spec:
      containers:
        - name: app
          image: neonoble-ramp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: neonoble-ramp-secrets
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_TRANSAK_ENVIRONMENT
              value: PRODUCTION
            - name: NEXT_PUBLIC_CHAIN_ID
              value: "56"
            - name: TRANSAK_WIDGET_URL
              value: https://global.transak.com
            - name: TRANSAK_API_BASE_URL
              value: https://api.transak.com
            - name: TRANSAK_API_GATEWAY_URL
              value: https://api-gateway.transak.com
            - name: NEXT_PUBLIC_TRANSAK_PUSHER_APP_KEY
              value: 1d9ffac87de599c61283
            - name: NEXT_PUBLIC_TRANSAK_PUSHER_CLUSTER
              value: ap2
            - name: OTEL_ENABLED
              value: "true"
            - name: OTEL_SERVICE_NAME
              value: neonoble-ramp
            - name: EXCHANGE_EVENT_STREAM
              value: exchange:events
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
