apiVersion: apps/v1
kind: Deployment
metadata:
  name: neonoble-trading-engine-canary
  namespace: neonoble-ramp
  labels:
    app.kubernetes.io/name: neonoble-ramp
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neonoble-ramp
      track: canary
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neonoble-ramp
        track: canary
    spec:
      containers:
        - name: app
          image: neonoble-ramp:latest
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: neonoble-ramp-secrets
          env:
            - name: FEATURE_CLOB_TRADING
              value: "true"
            - name: CANARY_DEPLOYMENT
              value: "true"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
