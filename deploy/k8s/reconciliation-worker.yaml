apiVersion: apps/v1
kind: Deployment
metadata:
  name: neonoble-reconciliation-worker
  namespace: neonoble-ramp
  labels:
    app.kubernetes.io/name: neonoble-reconciliation-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: neonoble-reconciliation-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neonoble-reconciliation-worker
    spec:
      containers:
        - name: worker
          image: neonoble-ramp:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "workers/reconciliationWorker.js"]
          envFrom:
            - secretRef:
                name: neonoble-ramp-secrets
          env:
            - name: RECONCILIATION_BASE_URL
              value: http://neonoble-ramp
            - name: RECONCILIATION_INTERVAL_MS
              value: "60000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
