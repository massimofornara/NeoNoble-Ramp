apiVersion: apps/v1
kind: Deployment
metadata:
  name: neonoble-ws-gateway
  namespace: neonoble-ramp
  labels:
    app.kubernetes.io/name: neonoble-ws-gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: neonoble-ws-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neonoble-ws-gateway
    spec:
      containers:
        - name: ws-gateway
          image: neonoble-ramp:latest
          command: ["node", "gateways/ws-gateway/server.js"]
          ports:
            - name: ws
              containerPort: 8080
          envFrom:
            - secretRef:
                name: neonoble-ramp-secrets
          env:
            - name: WS_GATEWAY_PORT
              value: "8080"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: neonoble-ws-gateway
  namespace: neonoble-ramp
spec:
  selector:
    app.kubernetes.io/name: neonoble-ws-gateway
  ports:
    - name: ws
      port: 8080
      targetPort: ws
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neonoble-ws-gateway
  namespace: neonoble-ramp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neonoble-ws-gateway
  minReplicas: 3
  maxReplicas: 100
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
