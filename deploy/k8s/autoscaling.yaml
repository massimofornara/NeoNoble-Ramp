apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: neonoble-ramp
  namespace: neonoble-ramp
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: neonoble-ramp
  minReplicas: 3
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
