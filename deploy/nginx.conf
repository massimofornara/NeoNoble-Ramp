server {
    listen 80;
    server_name app.neonoble.io staging.neonoble.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app.neonoble.io;

    ssl_certificate /etc/letsencrypt/live/app.neonoble.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.neonoble.io/privkey.pem;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self' https://global.transak.com https://global-stg.transak.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.transak.com https://*.sumsub.com https://js.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://*.transak.com https://*.sumsub.com; img-src 'self' data: blob: https://*.transak.com https://assets.transak.com https://assets-stg.transak.com https://*.sumsub.com; font-src 'self' data: https://*.transak.com https://*.sumsub.com; frame-src 'self' https://global.transak.com https://global-stg.transak.com https://*.transak.com https://*.sumsub.com https://*.sumsub.io; connect-src 'self' https://api.transak.com https://api-stg.transak.com https://api-gateway.transak.com https://api-gateway-stg.transak.com https://*.transak.com https://*.sumsub.com https://*.sentry.io https://*.pusher.com https://*.pusherapp.com wss://*.pusher.com wss://*.pusherapp.com; worker-src 'self' blob:" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /api/health {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
